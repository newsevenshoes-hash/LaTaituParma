<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Taitù Parma</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-gray-50" x-data="store()" x-init="init()">
    <main class="max-w-4xl mx-auto p-4">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <template x-for="prodotto in prodotti" :key="prodotto.id">
                <div class="bg-white rounded-3xl shadow-lg overflow-hidden">
                    <div class="relative w-full h-80 bg-gray-200" x-data="{ mostra3d: false }">
                        <img :src="prodotto.foto" class="w-full h-full object-cover" x-show="!mostra3d">
                        
                        <template x-if="prodotto.modello3d">
    <model-viewer 
        x-show="mostra3d"
        :src="prodotto.modello3d" 
        auto-rotate 
        camera-controls 
        style="height: 320px; width: 100%;" 
        class="bg-gray-100">
    </model-viewer>
</template>

                        <button @click="mostra3d = !mostra3d" x-show="prodotto.modello3d" class="absolute bottom-4 left-4 bg-white px-4 py-2 rounded-full shadow text-xs font-bold uppercase">
                            <span x-text="mostra3d ? 'Foto' : 'Vedi 3D'"></span>
                        </button>
                    </div>
                    <div class="p-6">
                        <h2 class="text-xl font-bold" x-text="prodotto.nome"></h2>
                        <p class="text-lg text-pink-600" x-text="'€' + prodotto.prezzo"></p>
                    </div>
                </div>
            </template>
        </div>
    </main>

    <script>
        function store() {
            return {
                prodotti: [],
                urlFoglio: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRRxWL4tCODR9tUs2h_9RIo9NwDxKZy1KdMxOiT5TKYq9DFbohH2h369ATqJAJWxGcc43ryxC0PdIDg/pub?output=csv",
                async init() {
                    const r = await fetch(this.urlFoglio + "&t=" + Date.now());
                    const text = await r.text();
                    this.prodotti = this.parseCSV(text);
                },
                parseCSV(csv) {
                    const righe = csv.split(/\r?\n/).filter(r => r.trim() !== "");
                    return righe.slice(1).map((riga, i) => {
                        const d = riga.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(s => s.replace(/^"|"$/g, '').trim());
                        return { id: i, nome: d[1] || '', prezzo: d[3] || '0', foto: d[4] || '', modello3d: d[7] || '' };
                    });
                }
            }
        }
    </script>
</body>
</html>
